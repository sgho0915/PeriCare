name: pericare
description: A new Flutter project for Peritoneal Dialysis Care.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1
  firebase_database: ^11.0.1

  # State Management
  flutter_riverpod: ^2.5.1

  # Routing
  go_router: ^14.1.0

  # Hardware & Sensors
  mobile_scanner: ^5.1.0
  flutter_blue_plus: ^1.31.20

  # UI & UX
  cupertino_icons: ^1.0.6
  fl_chart: ^0.68.0
  intl: ^0.19.0

  # PDF Generation & Sharing
  pdf: ^3.10.8
  path_provider: ^2.1.3
  url_launcher: ^6.2.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
